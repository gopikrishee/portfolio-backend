name: Deploy to Publish Branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Deploy to Publish Branch
        run: |
          # Ensure local copy of remote branches
          git fetch origin

          # Check if publish branch exists
          if git ls-remote --exit-code --heads origin publish; then
            git checkout publish
          else
            git checkout -b publish
          fi

          # Copy files from bin/Publish to root (preserving structure)
          # We must ensure we are back on the target branch before copying
          cp -r bin/Publish/* .
          
          # Remove the bin, obj, and .github directories to clean up
          rm -rf bin obj .github

          # Commit and push
          git add .
          git commit -m "Deploy build artifacts to publish branch"
          git push origin publish
