name: Deploy to Publish Branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout and Build
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Deploy to Publish Branch
        run: |
          # 1. Identify the artifact location while on main
          # Use a temp directory outside the repo workspace
          ARTIFACT_DIR=$(mktemp -d)
          cp -r bin/Publish/* "$ARTIFACT_DIR/"

          # 2. Switch to publish branch
          git fetch origin
          if git ls-remote --exit-code --heads origin publish; then
            git checkout publish
          else
            git checkout -b publish
          fi

          # 3. Clean and deploy
          git rm -rf .
          cp -r "$ARTIFACT_DIR"/* .
          
          # 4. Commit and push
          git add .
          git commit -m "Deploy build artifacts to publish branch"
          git push origin publish
