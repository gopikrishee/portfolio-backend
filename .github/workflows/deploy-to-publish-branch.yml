name: Deploy to Publish Branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout and Build
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Deploy to Publish Branch
        run: |
          # Create a temp directory for the artifacts to avoid polluting main
          mkdir ../artifacts
          cp -r bin/Publish/* ../artifacts/

          # Fetch and checkout publish branch in a new worktree or just switch
          # Since we have the repo checked out, we can switch branches.
          # To ensure we don't affect main, we will verify we are on the publish branch before any deletions.
          git fetch origin
          if git ls-remote --exit-code --heads origin publish; then
            git checkout publish
          else
            git checkout -b publish
          fi

          # Delete all files in the current branch
          git rm -rf .

          # Move files from temp to root
          cp -r ../artifacts/* .
          
          # Commit and push
          git add .
          git commit -m "Deploy build artifacts to publish branch"
          git push origin publish
